<!DOCTYPE html>
<html>
<head>
<title>AI Interview Copilot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>AI Interview Copilot</h1>

<select id="level">
    <option value="junior">Junior</option>
    <option value="mid">Mid</option>
    <option value="senior">Senior</option>
</select>

<button onclick="setLevel()">
Set Level
</button>

<button onclick="getQuestion()">
Start Interview
</button>

<div id="question"></div>

<br>

<textarea
id="answer"
rows="8"
cols="80"
placeholder="Type your answer">
</textarea>

<br><br>

<button onclick="submitAnswer()">
Submit Answer
</button>

<div id="result"></div>

<h2>Progress Dashboard</h2>
<div id="dashboard"></div>

<button onclick="downloadReport()">
Download PDF Report
</button>

<canvas id="chart"></canvas>


<button onclick="loadHistory()">
Load History
</button>

<script>

const API =
"https://ai-interview-copilot-b4fa.onrender.com";

let historyChart = null;


async function getQuestion(){

    const res =
    await fetch(`${API}/question`);

    const data =
    await res.json();

    document
        .getElementById("question")
        .innerHTML =
        `<h2>${data.question}</h2>`;
}


async function submitAnswer(){

    const answer =
        document
        .getElementById("answer")
        .value;

    const res =
    await fetch(`${API}/score`,{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            answer
        })
    });

    const data =
        await res.json();

    document
        .getElementById("result")
        .innerHTML = `
        <h2>Score:
        ${data.score}%</h2>

        <p>${data.feedback}</p>
    `;

    document
        .getElementById("answer")
        .value = "";

    getQuestion();
}


async function loadHistory(){

    const res =
    await fetch(`${API}/history`);

    const data =
    await res.json();

    document
        .getElementById("dashboard")
        .innerHTML = "";

    const labels = [];
    const scores = [];

    data.forEach((h,i)=>{

        document
            .getElementById("dashboard")
            .innerHTML += `
            <div>
                Attempt ${i+1}
                — Score:
                ${h.score}%
            </div>
        `;

        labels.push(
            `Attempt ${i+1}`
        );

        scores.push(
            h.score
        );
    });

    const ctx =
        document
        .getElementById("chart")
        .getContext("2d");

    if(historyChart){
        historyChart.destroy();
    }

    historyChart =
    new Chart(ctx,{
        type:"line",

        data:{
            labels,
            datasets:[{
                label:
                "Interview Score",
                data:scores
            }]
        },

        options:{
            responsive:true
        }
    });
}

async function setLevel(){

    const level =
        document
        .getElementById("level")
        .value;

    await fetch(
        `${API}/level/${level}`
    );

    alert(
        `Level set to ${level}`
    );

    getQuestion();
}

function downloadReport(){

    window.open(
        `${API}/report`,
        "_blank"
    );
}
</script>

</body>
</html>
