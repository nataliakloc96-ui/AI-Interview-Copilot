<!DOCTYPE html>
<html>
<head>
<title>AI Interview Copilot</title>
</head>
<body>

<h1>AI Interview Copilot</h1>

<button onclick="getQuestion()">
Start Interview
</button>

<div id="question"></div>

<br>

<textarea
id="answer"
rows="8"
cols="80"
placeholder="Type your answer">
</textarea>

<br><br>

<button onclick="submitAnswer()">
Submit Answer
</button>

<div id="result"></div>

<script>

const API =
"https://YOUR_RENDER_URL.onrender.com";

async function getQuestion(){

    const res =
    await fetch(`${API}/question`);

    const data =
    await res.json();

    question.innerHTML =
        `<h2>${data.question}</h2>`;
}


async function submitAnswer(){

    const answer =
        document
        .getElementById("answer")
        .value;

    const res =
    await fetch(`${API}/score`,{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            answer
        })
    });

    const data =
        await res.json();

    result.innerHTML = `
        <h2>Score:
        ${data.score}%</h2>

        <p>
        ${data.feedback[0]}
        </p>
    `;
}

</script>

</body>
</html>
